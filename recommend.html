<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPOP.terminal // RECOMMEND</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Specific Form Styles for Tactical Form */
        .terminal-input {
            width: 100%;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid var(--outline-variant);
            color: var(--primary);
            font-family: var(--font-mono);
            padding: 12px 0;
            margin-bottom: 24px;
            font-size: 1rem;
        }
        .terminal-input:focus {
            outline: none;
            border-bottom-color: var(--primary-container);
            box-shadow: 0 2px 0 0 rgba(0, 251, 251, 0.2);
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="halftone" style="left: 0; width: 30%; right: auto; transform: scaleX(-1);"></div>

    <header class="nav-header">
        <div class="container nav-content">
            <div class="logo font-mono text-cyan">
                > JPOP<span style="color: var(--primary)">.terminal</span><span class="cursor-blink">_</span>
            </div>
            <nav class="nav-links">
                <a href="index.html">./home</a>
                <a href="artists.html">./artists</a>
                <a href="music.html">./music</a>
                <a href="recommend.html" class="active">./recommend</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 120px; min-height: 100vh; position: relative; z-index: 10;">
        <section class="section-low" style="border-bottom: 1px solid var(--outline-variant);">
            <div class="container">
                <div class="label mb-2">// SUBMIT RECOMMENDATION</div>
                <h1 class="display-lg mb-8">Recommend a Song</h1>
                <p style="color: var(--on-surface); font-size: 1rem; line-height: 1.8; max-width: 600px; font-weight: 100; margin-bottom: 2rem;">
                    Share your favorite Japanese music and help others discover great songs.
                </p>

                <div class="recommend-layout">
                    <div class="recommend-form">
                        <form action="https://formspree.io/f/xnjlpllq" method="POST">
                            <div class="field-group">
                                <label class="label text-cyan">YOUR NAME</label>
                                <input type="text" class="terminal-input" placeholder="Enter your name (optional)">
                            </div>

                            <div class="field-group">
                                <label class="label text-cyan">TRACK TITLE</label>
                                <input type="text" class="terminal-input" placeholder="Enter the song title" required>
                            </div>

                            <div class="field-group">
                                <label class="label text-cyan">ARTIST / BAND</label>
                                <input type="text" class="terminal-input" placeholder="Enter artist or band name" required>
                            </div>

                            <div class="field-group genre-field">
                                <label class="label text-cyan">GENRE</label>
                                <div class="chip-list">
                                    <button type="button" class="chip">J-pop</button>
                                    <button type="button" class="chip">J-rock</button>
                                    <button type="button" class="chip">City Pop</button>
                                    <button type="button" class="chip">Future Bass</button>
                                    <button type="button" class="chip">R&B</button>
                                    <button type="button" class="chip">Indie</button>
                                    <button type="button" class="chip">Electronic</button>
                                    <button type="button" class="chip">Ballad</button>
                                </div>
                                <input type="hidden" name="genres" id="selected-genres">
                            </div>

                            <div class="field-group">
                                <label class="label text-cyan">LINK</label>
                                <input type="text" class="terminal-input" placeholder="Spotify / YouTube / Apple Music link">
                            </div>

                            <div class="field-group">
                                <label class="label text-cyan">WHY THIS TRACK?</label>
                                <textarea class="terminal-input" rows="4" placeholder="Why do you recommend this song?"></textarea>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn-primary">&gt; SUBMIT RECOMMENDATION</button>
                            </div>
                        </form>
                    </div>

                    <div class="recommend-terminal">
                        <div class="terminal-window" style="min-height: 440px;">
                            <div class="terminal-header">
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <span class="terminal-dot active"></span>
                                    <span class="terminal-dot"></span>
                                    <span class="terminal-dot"></span>
                                </div>
                                <span class="label" style="margin-left: auto;">submit.terminal</span>
                            </div>
                            <div class="terminal-body" style="min-height: 360px; padding: 1.5rem;">
                                <p style="color: var(--primary);">&gt; ready to receive recommendation...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
    <footer class="terminal-footer">
        <div class="container footer-content">
            <div class="font-mono text-cyan" style="font-weight: bold;">
                > JPOP<span style="color: var(--primary)">.terminal_</span>
            </div>
            <div class="label" style="color: #ffffff; text-transform: none; letter-spacing: 0.05em;">
                // Built with love for Japanese music
            </div>
        </div>
    </footer>
</body>
</html>
